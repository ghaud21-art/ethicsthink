<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
:root { --org:#FF4D1F; --ink:#1c1b2e; }
*{ box-sizing:border-box; }
body{ margin:0; color:var(--ink); background:#fff; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; }
.wrap{ max-width:1080px; margin:0 auto; padding:0 20px; }
button{ font-family:inherit; }
/* header */
header{ background:var(--org); }
.headRow{ display:flex; align-items:center; justify-content:space-between; height:60px; }
.brand{ background:none; border:none; color:#fff; font-size:18px; font-weight:800; cursor:pointer; }
.nav{ display:flex; align-items:center; gap:10px; }
.who{ color:#fff; font-weight:700; font-size:13px; }
.ghost{ background:rgba(255,255,255,.18); color:#fff; border:none; padding:8px 14px; border-radius:999px; font-weight:700; font-size:13px; cursor:pointer; }
.ghost:hover{ background:rgba(255,255,255,.3); }
/* buttons */
.primary{ background:var(--org); color:#fff; border:none; padding:11px 22px; border-radius:999px; font-weight:800; font-size:15px; cursor:pointer; }
.primary:hover{ filter:brightness(.95); }
.primary:disabled{ opacity:.5; cursor:default; }
.primary.full{ width:100%; margin-top:8px; }
.lite{ background:#f3f1f5; color:#555; border:none; padding:9px 16px; border-radius:999px; font-weight:800; font-size:14px; cursor:pointer; }
.lite:hover{ background:#e8e5ec; }
.danger{ background:#fff; color:#d33; border:1px solid #f3c0c0; border-radius:999px; padding:7px 14px; font-weight:800; font-size:13px; cursor:pointer; }
/* home */
.hero{ padding:48px 0 24px; }
.eyebrow{ color:var(--org); font-weight:800; margin:0 0 8px; font-size:14px; }
.heroTitle{ font-size:34px; line-height:1.15; font-weight:800; letter-spacing:-1px; margin:0 0 12px; }
.heroSub{ font-size:15px; color:#555; max-width:620px; margin:0; line-height:1.6; }
.sectionTitle{ font-size:22px; font-weight:800; margin:24px 0 16px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:22px; padding-bottom:60px; }
.card{ text-align:left; background:#fff; border:1px solid #f0eef2; border-radius:18px; overflow:hidden; cursor:pointer; padding:0; transition:transform .15s,box-shadow .15s; }
.card:hover{ transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,.1); }
.thumb{ height:110px; position:relative; }
.thumbCount{ position:absolute; left:14px; bottom:12px; background:rgba(255,255,255,.85); color:#222; font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; }
.cardBody{ padding:16px 18px 20px; }
.cardTitle{ font-size:18px; font-weight:800; margin:2px 0 8px; line-height:1.3; }
.cardBlurb{ font-size:13px; color:#666; line-height:1.55; margin:0; }
/* topic */
.back{ background:none; border:none; color:#888; font-weight:700; cursor:pointer; padding:18px 0 6px; font-size:15px; }
.back:hover{ color:var(--org); }
.topicHead{ border-radius:22px; padding:30px; }
.tagLight{ color:#fff; font-size:12px; font-weight:800; }
.topicTitle{ color:#fff; font-size:26px; font-weight:800; margin:8px 0 10px; }
.topicBlurb{ color:#fff; opacity:.95; font-size:15px; max-width:600px; margin:0; line-height:1.6; }
.balanceBox{ background:#fff; border:1px solid #efedf2; border-radius:18px; padding:22px; margin-top:14px; box-shadow:0 6px 18px rgba(0,0,0,.04); }
.balanceQ{ font-size:16px; font-weight:800; text-align:center; margin:0 0 16px; }
.sides{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.sideBox{ border-radius:14px; padding:14px 16px; font-size:13px; line-height:1.5; font-weight:600; display:flex; gap:10px; align-items:center; }
.sideA{ background:#EAF3FF; color:#1c5fae; }
.sideB{ background:#FFF1E8; color:#b5491c; }
.sideLabel{ font-weight:800; width:24px; height:24px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; }
.sideA .sideLabel{ background:#2E86DE; }
.sideB .sideLabel{ background:var(--org); }
.thinkerGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding-bottom:60px; }
.thinkerCard{ border:1px solid #f0eef2; border-radius:18px; padding:24px 20px; text-align:center; }
.avatar{ width:60px; height:60px; border-radius:50%; margin:0 auto 14px; color:#fff; font-size:24px; font-weight:800; display:flex; align-items:center; justify-content:center; }
.thinkerName{ font-size:19px; font-weight:800; margin:0 0 4px; }
.thinkerSchool{ font-size:12px; color:#999; font-weight:700; }
.sideBadge{ display:inline-block; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; margin-top:6px; }
.sideBadge.a{ background:#EAF3FF; color:#1c5fae; }
.sideBadge.b{ background:#FFF1E8; color:#b5491c; }
.thinkerTag{ font-size:13px; color:#555; margin:10px 0 16px; line-height:1.5; min-height:40px; }
/* chat */
.chatHead{ display:flex; align-items:center; gap:14px; border-radius:18px; padding:16px 20px; margin-bottom:14px; }
.chatAvatar{ width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.35); color:#fff; font-size:20px; font-weight:800; display:flex; align-items:center; justify-content:center; }
.chatName{ color:#fff; font-size:17px; font-weight:800; }
.chatSchool{ color:#fff; opacity:.9; font-size:12px; }
.thread{ display:flex; flex-direction:column; gap:12px; min-height:260px; max-height:52vh; overflow-y:auto; padding:6px 2px; }
.row{ display:flex; }
.row.user{ justify-content:flex-end; }
.bubble{ max-width:80%; padding:13px 16px; border-radius:16px; font-size:15px; line-height:1.6; white-space:pre-wrap; }
.row.assistant .bubble{ background:#f5f3f7; border-bottom-left-radius:4px; }
.row.user .bubble{ background:var(--org); color:#fff; border-bottom-right-radius:4px; }
.challenge{ display:flex; align-items:center; gap:10px; background:#FFF3E8; border:1px solid #FFD9BD; border-radius:14px; padding:12px 16px; margin:12px 0; font-size:14px; color:#7a4a1f; line-height:1.5; }
.challengeTag{ background:var(--org); color:#fff; font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; white-space:nowrap; }
.inputBar{ display:flex; gap:10px; margin-top:14px; }
.textIn{ flex:1; border:1.5px solid #e4e0e8; border-radius:14px; padding:13px 16px; font-size:15px; font-family:inherit; outline:none; }
.textIn:focus{ border-color:var(--org); }
.sendBtn{ background:var(--org); color:#fff; border:none; padding:0 24px; border-radius:14px; font-weight:800; font-size:15px; cursor:pointer; }
.sendBtn:disabled{ opacity:.5; }
/* records / admin */
.pageTitle{ font-size:24px; font-weight:800; margin:18px 0 20px; }
.muted{ color:#999; padding:12px 0; }
.empty{ text-align:center; padding:46px 0; color:#777; }
.fbCard{ background:linear-gradient(135deg,#FFF4EC,#FFFBF7); border:1px solid #FFD9BD; border-radius:18px; padding:20px 22px; margin-bottom:24px; }
.fbHead{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.fbBadge{ background:var(--org); color:#fff; font-size:12px; font-weight:800; padding:5px 12px; border-radius:999px; }
.fbDate{ color:#aa9; font-size:13px; }
.fbText{ font-size:15px; line-height:1.75; color:#3a3147; white-space:pre-wrap; margin:0; }
.recItem{ border:1px solid #eee; border-radius:14px; overflow:hidden; margin-bottom:12px; }
.recHeader{ width:100%; display:flex; align-items:center; gap:12px; padding:16px; background:#fff; border:none; cursor:pointer; text-align:left; }
.recHeader:hover{ background:#faf9fb; }
.dot{ width:14px; height:14px; border-radius:50%; flex:none; }
.recTitle{ font-weight:800; font-size:15px; }
.recMeta{ margin-left:auto; color:#999; font-size:13px; }
.recBody{ padding:6px 18px 18px; display:flex; flex-direction:column; gap:8px; }
.recMsg{ font-size:14px; line-height:1.6; color:#444; }
.recMsg b{ color:var(--org); margin-right:4px; }
.recMsg.user b{ color:#333; }
/* admin */
.adminGrid{ display:grid; grid-template-columns:220px 1fr; gap:22px; padding-bottom:50px; }
.sList{ display:flex; flex-direction:column; gap:8px; }
.sBtn{ text-align:left; border:1px solid #eee; border-radius:12px; padding:12px 14px; background:#fff; cursor:pointer; display:flex; flex-direction:column; gap:3px; }
.sBtn span{ font-size:12px; color:#999; }
.sBtn.on{ border-color:var(--org); background:#FFF6F1; }
.panel{ border:1px solid #eee; border-radius:16px; padding:22px; min-height:200px; }
.panelHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.panelHead h3{ margin:0; font-size:18px; font-weight:800; }
.fbEdit{ width:100%; min-height:180px; margin-top:8px; border:1.5px solid #FFD9BD; border-radius:14px; padding:16px 18px; font-family:inherit; font-size:15px; line-height:1.75; color:#3a3147; background:#FFFBF7; outline:none; resize:vertical; }
.fbEdit:focus{ border-color:var(--org); }
.saveRow{ display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
.saveMsg{ color:#139c6a; font-weight:800; font-size:14px; }
.saveHint{ color:#aa9; font-size:13px; }
/* forms */
.form{ border:1px solid #eee; border-radius:16px; padding:20px; margin-bottom:24px; }
.form h4{ margin:0 0 14px; font-size:16px; font-weight:800; }
.field{ margin-bottom:12px; }
.field label{ display:block; font-size:13px; font-weight:700; color:#666; margin-bottom:5px; }
.field input,.field textarea,.field select{ width:100%; border:1.5px solid #e4e0e8; border-radius:12px; padding:11px 14px; font-size:14px; font-family:inherit; outline:none; }
.field input:focus,.field textarea:focus{ border-color:var(--org); }
.field textarea{ min-height:80px; resize:vertical; line-height:1.6; }
.two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.err{ color:#e23; font-size:13px; font-weight:700; margin:6px 0 0; }
/* overlay / modal */
.overlay{ position:fixed; inset:0; background:rgba(20,15,25,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
.modal{ background:#fff; border-radius:20px; padding:26px; width:100%; max-width:380px; }
.tabs{ display:flex; gap:8px; margin-bottom:18px; }
.tabs button{ flex:1; padding:9px; border:none; background:#f3f1f5; border-radius:10px; font-weight:800; cursor:pointer; color:#888; }
.tabs button.on{ background:var(--org); color:#fff; }
.modal h3{ font-size:20px; font-weight:800; margin:0 0 6px; }
.hint{ font-size:13px; color:#999; margin:0 0 16px; }
.modal input{ width:100%; border:1.5px solid #e4e0e8; border-radius:12px; padding:12px 14px; font-size:15px; font-family:inherit; outline:none; margin-bottom:10px; }
.modal input:focus{ border-color:var(--org); }
.classCodeBadge{ background:#FFF4EC; border:1px solid #FFD9BD; border-radius:12px; padding:14px 18px; margin-bottom:14px; }
.classCodeBadge .label{ font-size:12px; color:#999; font-weight:700; }
.classCodeBadge .code{ font-size:28px; font-weight:800; color:var(--org); letter-spacing:4px; }
/* manage */
.mgRow{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.topicPill{ border:1px solid #eee; background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; cursor:pointer; }
.topicPill.on{ background:var(--org); color:#fff; border-color:var(--org); }
.thList{ display:flex; flex-direction:column; gap:8px; margin:14px 0 22px; }
.thRow{ display:flex; align-items:center; gap:10px; border:1px solid #eee; border-radius:12px; padding:12px 14px; }
.thRow b{ font-size:15px; }
.thRow .meta{ color:#999; font-size:13px; }
.thRow .acts{ margin-left:auto; display:flex; gap:8px; }
@media(max-width:680px){
  .heroTitle{ font-size:26px; }
  .adminGrid{ grid-template-columns:1fr; }
  .sides,.two{ grid-template-columns:1fr; }
  .bubble{ max-width:88%; }
}
</style>
</head>
<body>
<header><div class="wrap headRow">
  <button class="brand" id="brand">생각하는 힘을 키우는 토론장</button>
  <nav class="nav" id="nav"></nav>
</div></header>
<main class="wrap" id="view"></main>
<div id="modalRoot"></div>

<script>
/* ===== 서버 호출 ===== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzXlxmYp1_LlqVvaCOFDC1jaEFb0Mq72RGAbVE5dTVO3M7nsr88BbAEivqst7-70Lrl/exec';

function call(fn){
  var args=[].slice.call(arguments,1);
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fn: fn, args: args })
  }).then(function(r){
    if(!r.ok) throw new Error('서버 오류: ' + r.status);
    return r.json();
  }).then(function(data){
    if(data && data.__error) throw new Error(data.__error);
    return data;
  });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
function grad(c){ return 'linear-gradient(135deg,'+(c&&c[0]||'#ccc')+','+(c&&c[1]||'#999')+')'; }

var CHALLENGES=[
  '이 사상가 주장에서 가장 약한 고리는 어디일까요? 그 지점을 콕 찌르는 질문을 해보세요.',
  '이 입장을 우리 학교·일상의 구체적 사례에 적용하면 어떤 문제가 생길지 물어보세요.',
  "방금 답변에서 더 깊이 파고들고 싶은 단어 하나를 골라 다시 질문해보세요.",
  '이 사상가가 절대 동의하지 않을 주장을 일부러 던져, 어떻게 반박하는지 들어보세요.',
  "만약 ~라면 어떻게 보시겠어요? 형태의 가정 질문으로 입장을 시험해보세요."
];

var S={
  topics:[], user:null, teacher:null, screen:'home',
  topic:null, thinker:null, messages:[], sessionId:null,
  sessionColors:null, userTurns:0, challenge:null, chatEnded:false,
  mgTopicId:null
};

var view=document.getElementById('view');
var nav=document.getElementById('nav');
document.getElementById('brand').onclick=function(){ S.teacher=null; go('home'); };

/* ===== 헤더 ===== */
function renderHeader(){
  if(S.teacher){
    nav.innerHTML='<span class="who">'+esc(S.teacher.email)+'</span>'
      +'<button class="ghost" id="navMg">콘텐츠 관리</button>'
      +'<button class="ghost" id="navOut">나가기</button>';
    nav.querySelector('#navMg').onclick=function(){ go('manage'); };
    nav.querySelector('#navOut').onclick=function(){ S.teacher=null; go('home'); };
  } else if(S.user){
    nav.innerHTML='<span class="who">'+esc(S.user.name)+' 학생</span>'
      +'<button class="ghost" id="navRec">내 토론 기록</button>'
      +'<button class="ghost" id="navOut">로그아웃</button>';
    nav.querySelector('#navRec').onclick=function(){ go('records'); };
    nav.querySelector('#navOut').onclick=function(){ S.user=null; go('home'); };
  } else {
    nav.innerHTML='<button class="ghost" id="navIn">로그인</button>';
    nav.querySelector('#navIn').onclick=openLogin;
  }
}

/* ===== 라우터 ===== */
function go(screen){
  S.screen=screen;
  renderHeader();
  ({home:renderHome,topic:renderTopic,chat:renderChat,records:renderRecords,admin:renderAdmin,manage:renderManage}[screen]||renderHome)();
  window.scrollTo(0,0);
}

/* ===== 홈 ===== */
function renderHome(){
  var cards=S.topics.map(function(t){
    return '<button class="card" data-id="'+t.id+'">'
      +'<div class="thumb" style="background:'+grad(t.colors)+'"><span class="thumbCount">사상가 '+t.thinkers.length+'명</span></div>'
      +'<div class="cardBody"><h3 class="cardTitle">'+esc(t.title)+'</h3><p class="cardBlurb">'+esc(t.blurb)+'</p></div></button>';
  }).join('');
  view.innerHTML='<section class="hero"><p class="eyebrow">사상가와 마주 앉아</p>'
    +'<h1 class="heroTitle">질문하고, 따져 묻고, 생각을 키우다</h1>'
    +'<p class="heroSub">주제를 고르면 그 문제를 두고 동·서양 사상가들이 기다립니다. 마음에 드는 한 사람을 골라 토론을 시작하세요.</p></section>'
    +'<h2 class="sectionTitle">토론 주제</h2><div class="grid">'+cards+'</div>';
  [].forEach.call(view.querySelectorAll('.card'),function(b){
    b.onclick=function(){ S.topic=S.topics.filter(function(t){return t.id===b.dataset.id;})[0]; go('topic'); };
  });
}

/* ===== 주제 ===== */
function renderTopic(){
  var t=S.topic;
  var bal=t.balance?'<div class="balanceBox"><p class="balanceQ">'+esc(t.balance.question)+'</p><div class="sides">'
    +'<div class="sideBox sideA"><span class="sideLabel">A</span><span>'+esc(t.balance.a)+'</span></div>'
    +'<div class="sideBox sideB"><span class="sideLabel">B</span><span>'+esc(t.balance.b)+'</span></div></div></div>':'';
  var cards=t.thinkers.map(function(k,i){
    var badge=k.side?'<span class="sideBadge '+(String(k.side).charAt(0)==='A'?'a':'b')+'">'+esc(k.side)+'</span>':'';
    return '<div class="thinkerCard"><div class="avatar" style="background:'+grad(t.colors)+'">'+esc(k.name.slice(0,1))+'</div>'
      +'<h3 class="thinkerName">'+esc(k.name)+'</h3><span class="thinkerSchool">'+esc(k.school)+'</span>'+badge
      +'<p class="thinkerTag">"'+esc(k.tagline)+'"</p><button class="primary" data-i="'+i+'">토론 시작</button></div>';
  }).join('');
  view.innerHTML='<button class="back" id="bk">← 주제 목록</button>'
    +'<div class="topicHead" style="background:'+grad(t.colors)+'"><h1 class="topicTitle">'+esc(t.title)+'</h1>'
    +'<p class="topicBlurb">'+esc(t.blurb)+'</p></div>'
    +bal+'<h2 class="sectionTitle">누구와 이야기해볼까요?</h2><div class="thinkerGrid">'+cards+'</div>';
  view.querySelector('#bk').onclick=function(){ go('home'); };
  [].forEach.call(view.querySelectorAll('.thinkerCard .primary'),function(b){
    b.onclick=function(){
      S.thinker=t.thinkers[+b.dataset.i];
      if(!S.user){ openLogin(function(){ startChat(); }); } else { startChat(); }
    };
  });
}

/* ===== 토론 ===== */
function startChat(){
  go('chat');
  view.innerHTML='<p class="muted">토론을 준비하고 있어요…</p>';
  call('apiStartSession', S.user.classCode, S.user.sid, S.user.name, S.topic.id, S.thinker.name).then(function(r){
    if(!r.ok){ view.innerHTML='<p class="muted">'+esc(r.error||'시작 실패')+'</p>'; return; }
    S.sessionId=r.sessionId; S.sessionColors=r.colors||S.topic.colors;
    S.messages=[{role:'assistant',content:r.greeting}];
    S.userTurns=0; S.challenge=null; S.chatEnded=false;
    renderChat();
  });
}
function renderChat(){
  var t=S.topic,k=S.thinker,c=S.sessionColors||t.colors;
  var thread=S.messages.map(function(m){
    return '<div class="row '+m.role+'"><div class="bubble">'+esc(m.content)+'</div></div>';
  }).join('');
  var ch=S.challenge?'<div class="challenge"><span class="challengeTag">질문 도전</span><span>'+esc(S.challenge)+'</span></div>':'';
  var isEnding=S.userTurns>=8;
  var bottomBar=S.chatEnded
    ?'<div class="inputBar" style="justify-content:center"><button class="primary" id="goRec">내 토론 기록 보기</button></div>'
    :'<div class="inputBar"><input class="textIn" id="msg" placeholder="질문하거나, 당신의 생각을 말해보세요"><button class="sendBtn" id="send">보내기</button></div>'
      +(isEnding?'<div style="text-align:center;margin-top:10px"><button class="lite" id="endBtn">✅ 토론 마무리하기</button></div>':'');
  view.innerHTML='<button class="back" id="bk">← '+esc(t.title)+'</button>'
    +'<div class="chatHead" style="background:'+grad(c)+'"><div class="chatAvatar">'+esc(k.name.slice(0,1))+'</div>'
    +'<div><div class="chatName">'+esc(k.name)+'</div><div class="chatSchool">'+esc(k.school)+'</div></div></div>'
    +'<div class="thread" id="thread">'+thread+'</div>'+ch+bottomBar;
  view.querySelector('#bk').onclick=function(){ go('topic'); };
  if(!S.chatEnded){
    var input=view.querySelector('#msg'),btn=view.querySelector('#send');
    function send(){
      var text=input.value.trim(); if(!text) return;
      S.messages.push({role:'user',content:text}); S.challenge=null;
      renderChat();
      var th=view.querySelector('#thread');
      th.innerHTML+='<div class="row assistant"><div class="bubble" style="color:#999">생각하는 중…</div></div>';
      th.scrollTop=th.scrollHeight;
      view.querySelector('#send').disabled=true;
      call('apiSendMessage',S.user.classCode,S.sessionId,S.topic.id,S.thinker.name,S.messages,S.userTurns).then(function(r){
        S.messages.push({role:'assistant',content:(r&&r.ok)?r.reply:'지금은 연결이 원활하지 않네. 잠시 후 다시 물어봐 주게.'});
        S.userTurns+=1;
        if(S.userTurns%4===0) S.challenge=CHALLENGES[(S.userTurns/4-1)%CHALLENGES.length];
        renderChat();
      }).catch(function(){ S.messages.push({role:'assistant',content:'지금은 연결이 원활하지 않네.'}); renderChat(); });
    }
    btn.onclick=send;
    input.onkeydown=function(e){ if(e.key==='Enter'){e.preventDefault();send();} };
    var endBtn=view.querySelector('#endBtn');
    if(endBtn) endBtn.onclick=function(){ S.chatEnded=true; renderChat(); };
  } else {
    var gr=view.querySelector('#goRec'); if(gr) gr.onclick=function(){ go('records'); };
  }
  var th=view.querySelector('#thread'); th.scrollTop=th.scrollHeight;
  if(!S.chatEnded){ var inp=view.querySelector('#msg'); if(inp) inp.focus(); }
}

      root.querySelector('#tTabReg').style.cssText='flex:1;padding:9px;border:none;background:var(--org);color:#fff;border-radius:10px;font-weight:800;cursor:pointer';
      tInner.innerHTML='<h3>교사 회원가입</h3>'
        +'<p class="hint">가입 시 클래스 코드가 자동 발급됩니다.</p>'
        +'<input id="tRegEmail" placeholder="이메일">'
        +'<input id="tRegPw" type="password" placeholder="비밀번호">'
        +'<input id="tRegKey" placeholder="Gemini API 키 (본인 키 입력)">'
        +'<p class="err" id="tRegErr"></p>'
        +'<button class="primary full" id="tRegBtn">가입하기</button>';
      tInner.querySelector('#tRegBtn').onclick=function(){
        var email=tInner.querySelector('#tRegEmail').value;
        var pw=tInner.querySelector('#tRegPw').value;
        var key=tInner.querySelector('#tRegKey').value;
        if(!email||!pw||!key){tInner.querySelector('#tRegErr').textContent='모든 항목을 입력하세요.';return;}
        tInner.querySelector('#tRegBtn').disabled=true;
        tInner.querySelector('#tRegBtn').textContent='처리 중…';
        call('apiTeacherRegister',email,pw,key).then(function(r){
          if(!r.ok){tInner.querySelector('#tRegErr').textContent=r.error;tInner.querySelector('#tRegBtn').disabled=false;tInner.querySelector('#tRegBtn').textContent='가입하기';return;}
          close();
          showClassCodeModal(r.classCode);
        });
      };
    }
    root.querySelector('#tTabLogin').onclick=showLogin;
    root.querySelector('#tTabReg').onclick=showRegister;
    showLogin();
  }
  root.querySelector('#tabS').onclick=studentTab;
  root.querySelector('#tabT').onclick=teacherTab;
  studentTab();
}

/* ===== 클래스 코드 모달 ===== */
function showClassCodeModal(code) {
  var root = document.getElementById('modalRoot');
  root.innerHTML = '<div class="overlay" id="ccOv"><div class="modal" id="ccMd" style="text-align:center">'
    + '<h3 style="margin:0 0 6px">🎉 가입 완료!</h3>'
    + '<p style="font-size:14px;color:#777;margin:0 0 20px">이 클래스 코드를 학생들에게 공유하세요.</p>'
    + '<div style="background:#FFF4EC;border:2px solid var(--org);border-radius:16px;padding:20px;margin-bottom:20px">'
    + '<div style="font-size:12px;color:#999;font-weight:700;margin-bottom:8px">클래스 코드</div>'
    + '<div id="ccCode" style="font-size:36px;font-weight:800;color:var(--org);letter-spacing:6px">'+esc(code)+'</div></div>'
    + '<button class="primary full" id="ccCopy">📋 코드 복사하기</button>'
    + '<button class="lite full" style="margin-top:8px" id="ccClose">닫기 (로그인 화면으로)</button>'
    + '</div></div>';
  root.querySelector('#ccOv').onclick = function(e){ if(e.target===root.querySelector('#ccOv')) closeCodeModal(); };
  root.querySelector('#ccCopy').onclick = function(){
    navigator.clipboard.writeText(code).then(function(){
      root.querySelector('#ccCopy').textContent = '✅ 복사됐어요!';
      setTimeout(function(){ root.querySelector('#ccCopy').textContent = '📋 코드 복사하기'; }, 2000);
    }).catch(function(){
      // clipboard API 안 될 때 대안
      var el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      root.querySelector('#ccCopy').textContent = '✅ 복사됐어요!';
      setTimeout(function(){ root.querySelector('#ccCopy').textContent = '📋 코드 복사하기'; }, 2000);
    });
  };
  root.querySelector('#ccClose').onclick = closeCodeModal;
}
function closeCodeModal(){
  document.getElementById('modalRoot').innerHTML = '';
  openLogin();
}
function showClassCodeFromDashboard(code) {
  var root = document.getElementById('modalRoot');
  root.innerHTML = '<div class="overlay" id="ccOv2"><div class="modal" id="ccMd2" style="text-align:center">'
    + '<h3 style="margin:0 0 6px">📢 클래스 코드 공유</h3>'
    + '<p style="font-size:14px;color:#777;margin:0 0 20px">학생들에게 이 코드를 알려주세요.</p>'
    + '<div style="background:#FFF4EC;border:2px solid var(--org);border-radius:16px;padding:24px;margin-bottom:20px">'
    + '<div style="font-size:12px;color:#999;font-weight:700;margin-bottom:8px">클래스 코드</div>'
    + '<div style="font-size:40px;font-weight:800;color:var(--org);letter-spacing:6px">'+esc(code)+'</div></div>'
    + '<button class="primary full" id="ccCopy2">📋 코드 복사하기</button>'
    + '<button class="lite full" style="margin-top:8px" id="ccClose2">닫기</button>'
    + '</div></div>';
  root.querySelector('#ccOv2').onclick = function(e){ if(e.target===root.querySelector('#ccOv2')) root.innerHTML=''; };
  root.querySelector('#ccCopy2').onclick = function(){
    navigator.clipboard.writeText(code).then(function(){
      root.querySelector('#ccCopy2').textContent = '✅ 복사됐어요!';
      setTimeout(function(){ root.querySelector('#ccCopy2').textContent = '📋 코드 복사하기'; }, 2000);
    }).catch(function(){
      var el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      root.querySelector('#ccCopy2').textContent = '✅ 복사됐어요!';
      setTimeout(function(){ root.querySelector('#ccCopy2').textContent = '📋 코드 복사하기'; }, 2000);
    });
  };
  root.querySelector('#ccClose2').onclick = function(){ root.innerHTML=''; };
}
